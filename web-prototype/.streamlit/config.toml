[server]
# HF Spaces serves the app behind a reverse proxy, which trips Streamlit's
# XSRF check on the file-upload endpoint and returns 403. Disabling XSRF
# (and CORS, which Streamlit ties to it) fixes file_uploader on Spaces.
enableXsrfProtection = false
enableCORS = false

[theme]
primaryColor="#9611b3"
backgroundColor="#ffffff"
secondaryBackgroundColor="#e4e5ea"
textColor="#1e1e1e"
